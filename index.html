<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Go Green Board</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header Section -->
  <div class="header">
    <div class="logo-container">
      <img src="images/gogreenlogo.jpg" alt="Go Green Logo" class="logo">
      <img src="images/m911logo.png" alt="Mosquito 911 Logo" class="logo">
    </div>
    <div class="weather" id="weather"></div>
    <div class="clock" id="clock"></div>
  </div>



  <div id="forecast"></div>

  <!-- Main Content Area -->
  <div class="container">
    <!-- Left Column: Field Notes -->
    <div class="column" id="field-notes">
      <h2>Field Notes</h2>
      <ul></ul>
    </div>


    <!-- Center Column: Job Overview -->
    <div class="column" id="shop-notes">
      <h2>Shop/Office Notes</h2>
      <ul></ul>
    </div>

    <!-- Right Column: Notes & Reminders -->
    <div class="column" id="upcoming">
      <h2>Upcoming</h2>
      <ul></ul>
    </div>
  </div>

  <!-- Footer: Running Production Ticker -->
  <div class="ticker">
    <span id="production-data">CHECK CALL LOG AND COMMUNICATE.........MAKE IT A GREAT DAY......AND MORE BREAKING
      NEWS</span>
  </div>

  <script src="./.env.js"></script>
  <script src="script.js"></script>
</body>

</html>
